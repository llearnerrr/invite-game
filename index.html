<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>游戏邀请 - 好友等你开黑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1e2a 0%, #0f172a 50%, #020617 100%);
            animation: bgShift 8s infinite alternate;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, 'Poppins', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .invite-card {
            background: rgba(22, 26, 40, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 0 1px rgba(71, 125, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .invite-card:hover {
            transform: scale(1.02);
            box-shadow: 0 35px 55px rgba(0,0,0,0.5);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #E6F0FF 0%, #9BC0FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 12px 0;
        }

        .game-icon {
            margin: 16px 0 8px;
        }

        .game-icon img {
            width: 90px;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .game-icon img:hover {
            transform: scale(1.05);
        }

        .invite-text {
            font-size: 1.2rem;
            color: #C0D4FF;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 16px;
            border-radius: 60px;
            display: inline-block;
            margin: 20px 0 28px;
        }

        .buttons {
            position: relative;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 80px;
        }

        button {
            font-size: 1.3rem;
            font-weight: 600;
            padding: 14px 36px;
            min-width: 130px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #2c3145;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-yes {
            background: linear-gradient(120deg, #2b6ef0, #1445b0);
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.4);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 1;
        }

        .btn-yes::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 80%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .btn-yes:hover::after {
            opacity: 1;
            animation: shine 0.6s;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(25deg); }
            100% { transform: translateX(100%) rotate(25deg); }
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            filter: brightness(1.08);
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.5);
        }

        .btn-no {
            background: #2f3545;
            border: 1px solid #4a5168;
            transition: all 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
            z-index: 1000;
        }

        .btn-no:hover {
            background: #3f465a;
            transform: translateY(-2px);
        }

        .btn-no:active {
            transform: translateX(8px) scale(0.96);
        }

        /* 逃逸状态 */
        .btn-no.escaped {
            position: fixed;
            transition: left 0.25s ease, top 0.25s ease;
            margin: 0 !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* 占位符 */
        .no-placeholder {
            width: 130px;
            padding: 14px 36px;
            visibility: hidden;
            pointer-events: none;
            display: inline-block;
        }

        .steam-status {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #8ba2d6;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .online-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #5e6f8d;
        }

        /* 加载遮罩 */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: inherit;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #2b6ef0;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 24px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            background: linear-gradient(120deg, #e0e7ff, #9bc0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 轮播图片通用样式 */
        .carousel-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin: 25px 0;
        }

        /* 卡片退出动画 */
        .card-exit {
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) !important;
            transform: scale(0.8) !important;
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="invite-card">
        <div class="game-icon">
            <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcHpp529MQgyJf-w9HEJEOFM3F01SSAACsykAAnKFOFdQ6T6eZH9jWTsE.jpg" />

        </div>
        <h1>游戏邀请</h1>
        <div class="invite-text">好友邀请你加入游戏对局</div>
        <div class="buttons" id="buttonsContainer">
            <button class="btn-yes" id="acceptBtn">✅ 接受(yes) </button>
            <button class="btn-no" id="declineBtn">❌ 拒绝(no) </button>
        </div>
        <div class="steam-status">
            <span class="online-dot"></span> 好友正在游戏中 · 立即加入
        </div>
        <footer>点击接受将打开 Steam 客户端并加入游戏</footer>
    </div>

    <!-- 加载遮罩层（包含轮播图片） -->
    <div id="loadingOverlay">
        <!-- 轮播图片放在转圈上方 -->
        <img id="loadingCarouselImg" class="carousel-img" src="" alt="轮播图片">
        <div class="spinner"></div>
        <div class="loading-text">正在跳转 Steam 客户端...</div>
    </div>

    <script>
        // ==================== 配置 ====================
        const STEAM_INVITE_URL = "steam://joinlobby/730/109775241048624386/76561198123456789"; // 替换为真实链接
        const topImage = document.querySelector('.game-icon img');
        let topImageIndex = 0;   // 当前显示的是 TOP_IMAGES[0]

        // 4张轮播图片（请替换成你自己的图片链接）
        const CAROUSEL_IMAGES = [
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcIJp53OFrOsmDXbunk2cTaC2wSmGnAACvykAAnKFOFfwCHYZC_XirDsE.jpg" ,
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcH9p53K-V8L8f63Xm47ywEWKJ0Ua5gACvCkAAnKFOFc8eD9kENn1LzsE.jpg",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcH5p53EwkDaU_ujp-tibJRIXhIevowACuikAAnKFOFf6YrB6SIIulDsE.jpg",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcIhp53TFGNLeXZ4_WOyA5ttHMmz00gACxikAAnKFOFfEQL_3kFhrijsE.jpg" 
        ];
        const REJECT_CAROUSEL_IMAGES = [
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcMRp538bJ0yjO-040_sGxwd4ozORNgACGSoAAnKFOFeTaBxMDQu9cjsE.jpg" ,
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcMVp538y9hUICPAKnHJyke5Z6rHfsgACGioAAnKFOFcgQM76w4sbUjsE.jpg" ,
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcMZp539UghGTdAxHiTSDJrcZnfSysQACGyoAAnKFOFcjq0tU85b4ZDsE.jpg",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcMJp533zqJIXhFQ4Up1pfrBXr-FW2AACECoAAnKFOFfPw-xTZX5PXDsE.jpg" 
        ];
        // 顶部图片切换数组（初始图片为第1张，点击No后依次切换到第2、3、4张）
        const TOP_IMAGES = [
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcHpp529MQgyJf-w9HEJEOFM3F01SSAACsykAAnKFOFdQ6T6eZH9jWTsE.jpg" ,  // 初始图片
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcMBp5326Dmho7o6m_zzkP4YI2RFFOAACDioAAnKFOFfuybMnvHy-0TsE.jpg" ,
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcMdp53-2Jw99z3P6RtQvmDwrAczUcAACHioAAnKFOFfMlNnIVkEoxzsE.jpg" ,
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAETcMFp533cOHW3YXDVjvMhBDVTPNBL8AACDyoAAnKFOFdZfYsn_G8nkzsE.jpg" 
        ];
        // =============================================

        const acceptBtn = document.getElementById('acceptBtn');
        const declineBtn = document.getElementById('declineBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const inviteCard = document.querySelector('.invite-card');
        const buttonsContainer = document.getElementById('buttonsContainer');

        let noClickCount = 0;
        let placeholderDiv = null;
        let isEscaped = false;
        
        // 轮播相关变量
        let loadingCarouselInterval = null;
        let currentLoadingImgIndex = 0;
        let rejectCarouselInterval = null;   // 用于结束页轮播

        // 启动加载页轮播
        function startLoadingCarousel() {
            if (loadingCarouselInterval) clearInterval(loadingCarouselInterval);
            const imgElement = document.getElementById('loadingCarouselImg');
            if (!imgElement) return;
            currentLoadingImgIndex = 0;
            imgElement.src = CAROUSEL_IMAGES[currentLoadingImgIndex];
            loadingCarouselInterval = setInterval(() => {
                currentLoadingImgIndex = (currentLoadingImgIndex + 1) % CAROUSEL_IMAGES.length;
                imgElement.src = CAROUSEL_IMAGES[currentLoadingImgIndex];
            }, 1500);
        }

        // 停止加载页轮播（可选，跳转后页面卸载无需调用，但为了整洁）
        function stopLoadingCarousel() {
            if (loadingCarouselInterval) {
                clearInterval(loadingCarouselInterval);
                loadingCarouselInterval = null;
            }
        }

        // 获取按钮实际尺寸
        function getBtnRect() {
            const rect = declineBtn.getBoundingClientRect();
            return { width: rect.width, height: rect.height };
        }

        // 获取安全边界
        function getSafeBoundary(btnWidth, btnHeight) {
            const viewWidth = window.innerWidth;
            const viewHeight = window.innerHeight;
            const padding = 10;
            const maxLeft = Math.max(0, viewWidth - btnWidth - padding);
            const maxTop = Math.max(0, viewHeight - btnHeight - padding);
            const minLeft = padding;
            const minTop = padding;
            return { minLeft, maxLeft, minTop, maxTop };
        }

        // 生成随机位置
        function getRandomPositionInViewport() {
            const { width, height } = getBtnRect();
            const { minLeft, maxLeft, minTop, maxTop } = getSafeBoundary(width, height);
            let left, top;
            if (maxLeft < minLeft) {
                left = (window.innerWidth - width) / 2;
            } else {
                left = minLeft + Math.random() * (maxLeft - minLeft);
            }
            if (maxTop < minTop) {
                top = (window.innerHeight - height) / 2;
            } else {
                top = minTop + Math.random() * (maxTop - minTop);
            }
            left = Math.min(Math.max(left, 0), window.innerWidth - width);
            top = Math.min(Math.max(top, 0), window.innerHeight - height);
            return { left, top };
        }

        // 移动按钮
        function moveToRandomPosition() {
            if (!isEscaped) return;
            const { left, top } = getRandomPositionInViewport();
            declineBtn.style.left = left + 'px';
            declineBtn.style.top = top + 'px';
        }

        // 逃逸
        function escapeNoButton() {
            if (isEscaped) return;
            placeholderDiv = document.createElement('div');
            placeholderDiv.className = 'no-placeholder';
            const btnStyle = window.getComputedStyle(declineBtn);
            placeholderDiv.style.width = btnStyle.width;
            placeholderDiv.style.padding = btnStyle.padding;
            placeholderDiv.style.minWidth = btnStyle.minWidth;
            placeholderDiv.style.visibility = 'hidden';
            placeholderDiv.style.pointerEvents = 'none';
            placeholderDiv.style.display = 'inline-block';
            buttonsContainer.insertBefore(placeholderDiv, declineBtn);
            
            declineBtn.classList.add('escaped');
            declineBtn.style.position = 'fixed';
            declineBtn.style.margin = '0';
            declineBtn.style.left = '0';
            declineBtn.style.top = '0';
            setTimeout(() => {
                const { left, top } = getRandomPositionInViewport();
                declineBtn.style.left = left + 'px';
                declineBtn.style.top = top + 'px';
            }, 10);
            isEscaped = true;
        }

        // 清理逃逸并隐藏按钮
        function cleanupAndHide() {
            if (isEscaped) {
                declineBtn.classList.remove('escaped');
                declineBtn.style.position = '';
                declineBtn.style.left = '';
                declineBtn.style.top = '';
                declineBtn.style.margin = '';
            }
            if (placeholderDiv && placeholderDiv.parentNode) {
                placeholderDiv.parentNode.removeChild(placeholderDiv);
                placeholderDiv = null;
            }
            declineBtn.style.display = 'none';
            isEscaped = false;
        }

        // 结束页轮播（在拒绝页面内显示）
        function startRejectPageCarousel() {
            // 先清除已有的轮播
            if (rejectCarouselInterval) clearInterval(rejectCarouselInterval);
            const carouselImg = document.getElementById('rejectCarouselImg');
            if (!carouselImg) return;
            let index = 0;
            carouselImg.src = REJECT_CAROUSEL_IMAGES[index];
            rejectCarouselInterval = setInterval(() => {
                index = (index + 1) % REJECT_CAROUSEL_IMAGES.length;
                if (carouselImg) carouselImg.src = REJECT_CAROUSEL_IMAGES[index];
            }, 1500);
        }

        // 最终拒绝
        function finalReject() {
            declineBtn.disabled = true;
            acceptBtn.disabled = true;
            cleanupAndHide();
            inviteCard.classList.add('card-exit');
            setTimeout(() => {
                // 生成结束页，包含轮播图片
                const rejectHtml = `
                    <div style="text-align:center; margin-top:10vh;  min-height:100vh; color:white; font-family:sans-serif; padding:20px;">
                        <h2>😔 已拒绝邀请</h2>
                        <p style="margin-top:12px;">你可以关闭此页面了。</p>
                        <div style="margin-top:30px;">
                            <img id="rejectCarouselImg" class="carousel-img" src="" alt="轮播图片">
                        </div>
                    </div>
                `;
                document.body.innerHTML = rejectHtml;
                // 启动结束页轮播
                startRejectPageCarousel();
            }, 400);
        }
        declineBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (declineBtn.disabled) return;
            noClickCount++;
            
            if (noClickCount < 4) {
                // 每次点击 No（前3次）切换顶部图片到下一张
                if (topImage && topImageIndex + 1 < TOP_IMAGES.length) {
                    topImageIndex++;
                    topImage.src = TOP_IMAGES[topImageIndex];
                }
                if (!isEscaped) {
                    escapeNoButton();
                } else {
                    moveToRandomPosition();
                }
            } else {
                finalReject();
            }
        });



        // Yes 按钮
        acceptBtn.addEventListener('click', () => {
            if (acceptBtn.disabled) return;
            acceptBtn.disabled = true;
            acceptBtn.style.opacity = '0.6';
            // 显示加载遮罩并启动轮播
            loadingOverlay.style.display = 'flex';
            startLoadingCarousel();
            setTimeout(() => {
                window.location.href = STEAM_INVITE_URL;
            }, 120);
        });

        // 窗口大小改变时调整逃逸按钮位置
        window.addEventListener('resize', () => {
            if (isEscaped && !declineBtn.disabled) {
                moveToRandomPosition();
            }
        });
    </script>
</body>
</html>
